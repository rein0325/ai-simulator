<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奇幻冒險</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="gate">
    <div class="gate-box">
      <div class="gate-icon">⚔️</div>
      <h2>奇幻冒險</h2>
      <p>輸入密碼以進入</p>
      <input type="password" id="gate-input" placeholder="密碼" autofocus>
      <button id="gate-btn">進入</button>
      <div id="gate-step2" style="display:none; flex-direction:column; gap:14px; width:100%;">
        <hr style="border-color: var(--border); width:100%;">
        <p>首次使用，請輸入 Gemini API Key</p>
        <input type="password" id="key-input" placeholder="AIza...">
        <button onclick="confirmKey()">確認並開始</button>
      </div>
      <span id="gate-error"></span>
    </div>
  </div>

  <header>
    <a href="../../index.html" class="back-btn">← 選單</a>
    <h1>奇幻冒險</h1>
  </header>

  <main>
    <section class="story-panel">
      <div id="story-log">
        <div class="story-entry system">
          輸入密碼後開始冒險。
        </div>
      </div>
      <div class="input-area">
        <textarea id="player-input" placeholder="你想做什麼？（例：向北走、攻擊哥布林、查看背包）" rows="2"></textarea>
        <button id="send-btn">送出</button>
      </div>
    </section>

    <aside class="status-panel">
      <h2>角色狀態</h2>
      <div class="stat-block">
        <label>生命值</label>
        <div class="hp-bar-track">
          <div id="stat-hp-bar" class="hp-bar-fill"></div>
        </div>
        <span id="stat-hp">100 / 100</span>
      </div>
      <div class="stat-block">
        <label>金幣</label>
        <span id="stat-gold">30</span>
      </div>
      <div class="stat-block">
        <label>位置</label>
        <span id="stat-location">迷霧村莊</span>
      </div>
      <div class="stat-block">
        <label>背包</label>
        <span id="stat-inventory">生鏽短劍、麵包 x2</span>
      </div>
    </aside>
  </main>

  <script src="../../shared/api.js"></script>
  <script src="../../shared/state.js"></script>
  <script src="../../shared/memory.js"></script>
  <script src="config.js"></script>

  <script>
    const GATE_PASSWORD = '1235640325';  // ← 改這裡

    function unlock() {
      const pwInput = document.getElementById('gate-input').value;
      if (pwInput !== GATE_PASSWORD) {
        document.getElementById('gate-error').textContent = '密碼錯誤';
        document.getElementById('gate-input').value = '';
        document.getElementById('gate-input').focus();
        return;
      }
      const savedKey = localStorage.getItem('gemini_api_key');
      if (savedKey) {
        startApp(savedKey);
      } else {
        document.getElementById('gate-step2').style.display = 'flex';
      }
    }

    function confirmKey() {
      const key = document.getElementById('key-input').value.trim();
      if (!key) {
        document.getElementById('gate-error').textContent = '請輸入 API Key';
        return;
      }
      localStorage.setItem('gemini_api_key', key);
      startApp(key);
    }

    function startApp(apiKey) {
      window._apiKey = apiKey;
      document.getElementById('gate').style.display = 'none';
      StateManager.init(SimulatorConfig.initialState);
      MemoryManager.init(SimulatorConfig.systemPrompt);
      startGame();
    }

    document.getElementById('gate-btn').addEventListener('click', unlock);
    document.getElementById('gate-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') unlock();
    });

    document.getElementById('player-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    document.getElementById('send-btn').addEventListener('click', sendMessage);

    async function startGame() {
      appendStory('loading', '世界正在生成中...');
      try {
        MemoryManager.add('user', '請描述我的起始場景，讓我感受到這個世界的氛圍。');
        const raw = await AIApi.call(MemoryManager.getMessages(), window._apiKey);
        const { story, delta } = AIApi.parseResponse(raw);
        MemoryManager.add('assistant', raw);
        StateManager.applyDelta(delta);
        removeLoading();
        appendStory('ai', story);
      } catch (err) {
        removeLoading();
        appendStory('error', '錯誤：' + err.message);
      }
    }

    async function sendMessage() {
      const input = document.getElementById('player-input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      appendStory('player', text);
      appendStory('loading', 'AI 思考中...');
      document.getElementById('send-btn').disabled = true;

      try {
        MemoryManager.add('user', text);
        const raw = await AIApi.call(MemoryManager.getMessages(), window._apiKey);
        const { story, delta } = AIApi.parseResponse(raw);
        MemoryManager.add('assistant', raw);
        StateManager.applyDelta(delta);
        removeLoading();
        appendStory('ai', story);
      } catch (err) {
        removeLoading();
        appendStory('error', '錯誤：' + err.message);
      }

      document.getElementById('send-btn').disabled = false;
    }

    function appendStory(type, text) {
      const log = document.getElementById('story-log');
      const div = document.createElement('div');
      div.className = `story-entry ${type}`;
      if (type === 'loading') div.dataset.loading = 'true';
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function removeLoading() {
      const el = document.querySelector('[data-loading="true"]');
      if (el) el.remove();
    }
  </script>

</body>
</html>
